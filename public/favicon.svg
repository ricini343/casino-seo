<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF87"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded-square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle gradient border ring -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.5"
        fill="none" stroke="url(#g)" stroke-width="1" stroke-opacity="0.45"/>
  <!-- Spade body (two overlapping arcs meeting at a bottom point) -->
  <path d="M 16 4
    C 10 5, 7 10, 7 15
    C 7 19.5, 10.5 21.5, 13 20.5
    L 16 25
    L 19 20.5
    C 21.5 21.5, 25 19.5, 25 15
    C 25 10, 22 5, 16 4 Z"
    fill="url(#g)"/>
  <!-- Spade stem (flared trapezoid base) -->
  <path d="M 13 22 L 19 22 L 21.5 28 L 10.5 28 Z" fill="url(#g)"/>
</svg>
